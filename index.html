<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Portfólio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: 0.3s;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .dark {
      background: #111;
      color: white;
    }

    .dark .card {
      background: rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Olá 👋</h1>
    <p>Bem-vindo ao meu site no GitHub Pages</p>

    <p id="clock"></p>

    <button onclick="toggleTheme()">Modo Escuro</button>
    <button onclick="mensagem()">Clique aqui</button>

    <p id="msg"></p>

    <div class="footer">Feito com HTML + CSS + JS</div>
  </div>

  <script>
    // relógio
    setInterval(() => {
      document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
    }, 1000);

    // mensagem botão
    function mensagem() {
      document.getElementById("msg").innerText =
        "Seu site está funcionando 🚀";
    }

    // modo escuro
    function toggleTheme() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
