<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo do Projeto - Agrinho</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2e7d32; margin-bottom: 20px; }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .btn-voltar {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-voltar:hover { background-color: #1b5e20; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎥 Vídeo do Projeto Agrinho</h1>
        
        <div class="video-wrapper">
            <!-- OPÇÃO COM YOUTUBE: Substitua o "SEU_CODIGO_AQUI" pelo ID do seu vídeo -->
            <iframe src="https://youtube.com" allowfullscreen></iframe>
            
            <!-- OPÇÃO COM ARQUIVO MP4: Se preferir usar arquivo do GitHub, apague a linha do iframe acima e use esta abaixo: -->
            <!-- <video controls><source src="seu-video.mp4" type="video/mp4"></video> -->
        </div>

        <a href="index.html#sobre" class="btn-voltar">⬅ Voltar para o Site</a>
    </div>

</body>
</html>
